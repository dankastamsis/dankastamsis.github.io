<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rail Inspection System</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 0;
}

.header {
  background: #1e3a8a;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.label {
  font-size: 13px;
  color: #888;
}

.value {
  font-size: 18px;
  font-weight: bold;
}

select, button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 10px;
  font-size: 14px;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  font-weight: bold;
}

button:active {
  transform: scale(0.98);
}

.checklist label {
  display: block;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
  background: #f9fafb;
}

.status {
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  margin-top: 10px;
}

.green { background: #dcfce7; color: #166534; }
.yellow { background: #fef9c3; color: #854d0e; }
.red { background: #fee2e2; color: #991b1b; }

</style>
</head>

<body>

<div class="header">🚆 Rail Inspection System</div>

<div class="container">

  <!-- Info Lokasi -->
  <div class="card">
    <div class="label">Lintas</div>
    <div class="value" id="lintas">-</div>

    <div class="label" style="margin-top:10px;">KM</div>
    <div class="value" id="km">-</div>
  </div>

  <!-- Status -->
  <div id="statusBox" class="status green">
    Status: Aman
  </div>

  <!-- Pilih Gangguan -->
  <div class="card">
    <div class="label">Jenis Gangguan</div>
    <select id="gangguan" onchange="loadChecklist()">
      <option value="">-- Pilih --</option>
      <option value="ipm">IPM Elektrik</option>
      <option value="rel">Kerusakan Rel</option>
    </select>
  </div>

  <!-- Checklist -->
  <div class="card checklist" id="checklist">
    <div class="label">Checklist akan muncul di sini</div>
  </div>

  <!-- Tombol -->
  <button onclick="kirim()">🚀 Kirim Laporan</button>

</div>

<script>
// Ambil parameter URL
const params = new URLSearchParams(window.location.search);
const lintas = params.get("lintas");
const km = params.get("km");

document.getElementById("lintas").innerText = lintas || "-";
document.getElementById("km").innerText = km || "-";

// Checklist dinamis
function loadChecklist() {
  let jenis = document.getElementById("gangguan").value;
  let html = "";
  let status = document.getElementById("statusBox");

  if (jenis === "ipm") {
    html = `
      <label><input type="checkbox"> Lapor PPKP</label>
      <label><input type="checkbox"> Lapor Sintelis</label>
      <label><input type="checkbox"> Info Stasiun Sebelah</label>
    `;
    status.className = "status yellow";
    status.innerText = "Status: Perlu Penanganan";
  }

  if (jenis === "rel") {
    html = `
      <label><input type="checkbox"> Cek Retak</label>
      <label><input type="checkbox"> Cek Sambungan</label>
      <label><input type="checkbox"> Pasang Tanda Bahaya</label>
    `;
    status.className = "status red";
    status.innerText = "Status: Bahaya";
  }

  document.getElementById("checklist").innerHTML = html;
}

// Kirim data
function kirim() {
  let data = {
    lintas: lintas,
    km: km,
    gangguan: document.getElementById("gangguan").value
  };

  console.log(data);

  alert("✅ Laporan berhasil dikirim!");
}
</script>

</body>
</html>
