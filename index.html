<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Railway QR Monitoring</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

select, input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

button {
  background: green;
  color: white;
}

.status {
  padding: 10px;
  text-align: center;
  color: white;
}

.red { background: red; }
.yellow { background: orange; }
.green { background: green; }

img {
  width: 100%;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
Lintas: <b id="lintas"></b><br>
KM: <b id="km"></b>
</div>

<div class="card">
<select id="gangguan" onchange="loadChecklist()">
<option value="">-- Pilih --</option>

<optgroup label="Rel">
<option value="retak">Retak</option>
<option value="aus">Aus</option>
<option value="sambungan">Sambungan</option>
<option value="deformasi">Deformasi</option>
<option value="gogosan">Gogosan</option>
<option value="lengkung">Lengkung</option>
</optgroup>

<optgroup label="Wesel">
<option value="lidah">Lidah</option>
<option value="macet">Macet</option>
<option value="baut">Baut</option>
<option value="kunci">Kunci</option>
</optgroup>

</select>
</div>

<div id="statusBox" class="status green">Status Normal</div>

<div class="card">
<div id="checklist"></div>
</div>

<div class="card">
<input type="file" accept="image/*" capture="environment" id="foto">
</div>

<button onclick="laporkan()">📤 Laporkan</button>

<div class="card">
<div id="jumlahHistory"></div>
<div id="historyBox"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// 🔥 GANTI DENGAN URL ANDA
const API_URL = "https://script.google.com/macros/s/XXXXXXXX/exec";

const params = new URLSearchParams(window.location.search);
const lintas = params.get("lintas") || "-";
const km = params.get("km") || "-";

document.getElementById("lintas").innerText = lintas;
document.getElementById("km").innerText = km;

// CHECKLIST
function loadChecklist() {
  let jenis = document.getElementById("gangguan").value;

  const data = {
    retak: ["Identifikasi", "Tandai", "Lapor"],
    aus: ["Ukur", "Foto", "Monitor"],
    sambungan: ["Cek baut", "Kencangkan"],
    deformasi: ["Cek bentuk", "Batasi"],
    gogosan: ["Ukur kedalaman", "Grinding"],
    lengkung: ["Cek radius", "Batasi"],
    lidah: ["Cek lidah", "Bersihkan"],
    macet: ["Cek motor", "Manual"],
    baut: ["Kencangkan", "Ganti"],
    kunci: ["Cek pengunci"]
  };

  let html = "";
  if (data[jenis]) {
    html = data[jenis].map(i => `<label><input type="checkbox"> ${i}</label><br>`).join("");
  }

  document.getElementById("checklist").innerHTML = html;
}

// LAPOR
function laporkan() {
  const { jsPDF } = window.jspdf;

  let jenis = document.getElementById("gangguan").value;

  let checklist = [];
  document.querySelectorAll("#checklist input:checked").forEach(el => {
    checklist.push(el.parentElement.innerText);
  });

  let file = document.getElementById("foto").files[0];

  if (!file) {
    alert("Foto wajib!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e) {
    let img = e.target.result;

    // PDF
    let doc = new jsPDF();
    doc.text("LAPORAN", 10, 10);
    doc.text(`Lintas: ${lintas}`, 10, 20);
    doc.text(`KM: ${km}`, 10, 25);
    doc.text(`Jenis: ${jenis}`, 10, 30);

    let y = 40;
    checklist.forEach(c => {
      doc.text("- " + c, 10, y);
      y += 5;
    });

    doc.addImage(img, 'JPEG', 10, y+5, 80, 60);
    doc.save("laporan.pdf");

    // KIRIM KE SHEET
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        waktu: new Date().toLocaleString(),
        lintas,
        km,
        jenis,
        checklist: checklist.join(", "),
        foto: img
      })
    });

    // WHATSAPP
    let pesan = `LAPORAN\nLintas:${lintas}\nKM:${km}\nJenis:${jenis}`;
    window.open("https://wa.me/?text=" + encodeURIComponent(pesan));

    tampilkanHistory();
  };

  reader.readAsDataURL(file);
}

// AMBIL HISTORY
function tampilkanHistory() {
  fetch(`${API_URL}?lintas=${lintas}&km=${km}`)
    .then(res => res.json())
    .then(data => {

      let html = "";

      data.reverse().forEach(i => {
        html += `
          <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <b>${i.waktu}</b><br>
            ${i.jenis}<br>
            <img src="${i.foto}">
          </div>
        `;
      });

      document.getElementById("historyBox").innerHTML = html;
      document.getElementById("jumlahHistory").innerText =
        "Total: " + data.length;
    });
}

// AUTO LOAD
window.onload = tampilkanHistory;

</script>

</body>
</html>
