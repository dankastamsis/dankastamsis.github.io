<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost & Found KAI Bandara</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:#f4f6f8}
.container{max-width:1100px;margin:24px auto;background:white;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);overflow:hidden}
.header{background:#0b57d0;color:white;padding:20px}
.tabs{display:flex;border-bottom:1px solid #ddd}
.tab-btn{padding:14px;border:none;background:transparent;cursor:pointer;font-weight:600}
.tab-btn.active{background:white;border-bottom:3px solid #0b57d0;color:#0b57d0}
.tab-content{display:none;padding:24px}
.tab-content.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.field{display:flex;flex-direction:column;margin-bottom:12px}
input,textarea{padding:10px;border:1px solid #ccc;border-radius:8px}
.actions{margin-top:12px}
button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;background:#0b57d0;color:white}
button.secondary{background:#ccc;color:black}
</style>
</head>

<body>

<div class="container">
<div class="header">
<h2>Lost & Found - KAI Bandara</h2>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'claim')">Pengambilan</button>
<button class="tab-btn" onclick="openTab(event,'found')">Penemuan</button>
<button class="tab-btn" onclick="openTab(event,'handover')">Berita Acara</button>
</div>

<!-- CLAIM -->
<div id="claim" class="tab-content active">
<h3>Form Pengambilan</h3>

<div class="grid">
<input id="claimName" placeholder="Nama">
<input id="claimAddress" placeholder="Alamat">
<input id="claimIdentity" placeholder="No Identitas">
<input id="claimPhone" placeholder="Telepon">
<input id="claimMobile" placeholder="HP">
<input id="claimEmail" placeholder="Email">
<input id="claimDate" type="date">
</div>

<textarea id="claimDescription" placeholder="Deskripsi barang"></textarea>

<input type="file" id="claimPhoto" accept="image/*" onchange="previewClaimImage(event)">
<img id="claimPhotoPreview" style="max-width:200px;display:none">

<div class="actions">
<button onclick="saveData('claim')">Simpan & PDF</button>
</div>
</div>

<!-- HANDOVER -->
<div id="handover" class="tab-content">
<h3>Berita Acara</h3>

<div class="grid">
<input id="firstParty" placeholder="Pihak 1">
<input id="firstRole" placeholder="Jabatan">
<input id="secondParty" placeholder="Pihak 2">
<input id="secondRole" placeholder="Jabatan">
<input id="handoverItem" placeholder="Barang">
<input id="handoverRef" placeholder="No/Tanggal">
<input id="handoverQty" type="number" value="1">
</div>

<div class="actions">
<button onclick="saveData('handover')">Simpan & PDF</button>
</div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// TAB
function openTab(evt,id){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
evt.target.classList.add('active');
}

// PREVIEW FOTO
function previewClaimImage(e){
const img=document.getElementById('claimPhotoPreview');
img.src=URL.createObjectURL(e.target.files[0]);
img.style.display='block';
}

// SAVE
function saveData(type){

let data={};

if(type==='claim'){
data={
nama:claimName.value,
alamat:claimAddress.value,
identitas:claimIdentity.value,
telepon:claimPhone.value,
mobile:claimMobile.value,
email:claimEmail.value,
tanggal:claimDate.value,
deskripsi:claimDescription.value,
foto:document.getElementById('claimPhotoPreview').src || ''
};
}

if(type==='handover'){
data={
pihak1:firstParty.value,
jabatan1:firstRole.value,
pihak2:secondParty.value,
jabatan2:secondRole.value,
barang:handoverItem.value,
referensi:handoverRef.value,
jumlah:handoverQty.value
};
}

exportFilledPDF(type,data);
}


// ================= PDF =================
function exportFilledPDF(type,d){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y=20;

// BORDER
doc.rect(10,10,190,277);

// HEADER
doc.setFontSize(18);
doc.text('KAI Bandara',20,y);

doc.setFontSize(12);

if(type==='claim'){

doc.text('FORM PENGAMBILAN BARANG / FOUND FORM',105,30,{align:'center'});

y=45;

doc.text('Penumpang Yth,',20,y); y+=6;
doc.text('Kami mohon maaf atas ketidaknyamanan anda.',20,y); y+=6;
doc.text('Silahkan mengisi formulir ini.',20,y);

y+=10;

const line=(label,val)=>{
doc.text(label,20,y);
doc.text(':',75,y);
doc.text(val||'-',80,y);
y+=8;
};

line('Nama',d.nama);
line('Alamat',d.alamat);
line('No Identitas',d.identitas);
line('Telepon',d.telepon);
line('HP',d.mobile);
line('Email',d.email);
line('Tanggal',d.tanggal);

y+=6;

doc.text('Deskripsi Barang:',20,y);
y+=6;

const txt=doc.splitTextToSize(d.deskripsi||'-',170);
doc.text(txt,20,y);

y+=txt.length*6;

// FOTO
if(d.foto){
y+=6;
doc.addImage(d.foto,'JPEG',20,y,60,45);
}

// TTD
y=250;
doc.text('Penerima',30,y);
doc.text('Petugas',130,y);

doc.line(25,y+25,85,y+25);
doc.line(125,y+25,185,y+25);
}

if(type==='handover'){

doc.text('BERITA ACARA PENYERAHAN BARANG',105,30,{align:'center'});

y=45;

const line=(label,val)=>{
doc.text(label,20,y);
doc.text(':',60,y);
doc.text(val||'-',65,y);
y+=8;
};

line('Pihak 1',d.pihak1);
line('Jabatan',d.jabatan1);

y+=4;
line('Pihak 2',d.pihak2);
line('Jabatan',d.jabatan2);

y+=6;

line('Barang',d.barang);
line('Referensi',d.referensi);
line('Jumlah',d.jumlah);

y=250;
doc.text('Yang Menyerahkan',30,y);
doc.text('Yang Menerima',130,y);

doc.line(25,y+25,85,y+25);
doc.line(125,y+25,185,y+25);
}

doc.save('KAI_'+type+'.pdf');
}

</script>

</body>
</html>
